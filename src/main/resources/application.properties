# Server Configuration
server.port=8080

# File Scanner Configuration
# Add directories to watch (comma-separated)
file.scanner.watch-directories[0]=C:/work/miscTestFolder
# Archive subfolder name (will be created inside each watched directory)
file.scanner.archive-subfolder=Archive

# Logging Configuration
logging.level.com.apurv=DEBUG
logging.file.name=logs/string-inverter.log

# Maximum file size for uploads (10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable/Disable file scanner (true/false)
file.scanner.enabled=true

# File patterns to include (comma-separated, e.g., *.txt,*.csv)
file.scanner.include-patterns=*.data

# File patterns to exclude (comma-separated)
file.scanner.exclude-patterns=*.tmp,*.temp,~*

spring.data.mongodb.database=dockerDB
spring.data.mongodb.username=admin
spring.data.mongodb.password=admin
spring.data.mongodb.uri=mongodb://admin:admin@mongo_1:27017
